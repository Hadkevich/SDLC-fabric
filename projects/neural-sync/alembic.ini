# Alembic configuration for NEURAL SYNC
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory
script_location = src/db/migrations

# Template file for new migrations
file_template = %%(rev)s_%%(slug)s

# Timezone for revision dates
timezone = UTC

# Truncate revision date to seconds
truncate_slug_length = 40

# The SQLAlchemy connection URL is resolved at runtime from the
# DATABASE_URL_SYNC environment variable (see env.py).
# This value is used only as a fallback for offline SQL generation.
sqlalchemy.url = postgresql://neuralsync:neuralsync@localhost:5432/neuralsync

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
